<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta content="IE=edge" http-equiv="X-UA-Compatible" />
    <meta
      content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"
      name="viewport"
    />
    <title>Hyperlane - QRCode Generator</title>
    <link
      rel="icon"
      href="https://ltpp.vip/github/pages/docs-pages/pages/img/hyperlane.png"
    />
    <link href="../common/css/common.css" rel="stylesheet" />
    <link href="../common/css/header.css" rel="stylesheet" />
    <link href="./css/style.css" rel="stylesheet" />
    <script src="../common/js/request-manager.js"></script>
    <script src="../common/js/common.js"></script>
    <script src="../common/js/error-handler.js"></script>
    <script src="../common/js/qrcode.js"></script>
    <script
      src="../common/components/hyperlane-button.js"
      type="module"
    ></script>
    <script
      src="../common/components/hyperlane-loading.js"
      type="module"
    ></script>
    <script
      src="../common/components/hyperlane-header.js"
      type="module"
    ></script>
    <script
      src="../common/components/hyperlane-toast.js"
      type="module"
    ></script>
    <script
      src="../common/components/hyperlane-confirm.js"
      type="module"
    ></script>
    <script src="./js/app.js" defer></script>
  </head>
  <body>
    <div class="container">
      <hyperlane-header
        title="QRCode Generator"
        subtitle="Generate QR codes from text or URLs"
        shimmer
      ></hyperlane-header>
      <main class="main-content">
        <div class="form-container">
          <div class="action-bar">
            <hyperlane-button id="fileParseBtn" variant="primary" size="medium">
              <span class="btn-text">File Parse</span>
            </hyperlane-button>
            <input id="file_input" type="file" class="choose-file" />
            <hyperlane-button id="clearAllBtn" variant="danger" size="medium">
              <span class="btn-text">Clear All</span>
            </hyperlane-button>
            <hyperlane-button id="exportAllBtn" variant="primary" size="medium">
              <span class="btn-text">Export All</span>
            </hyperlane-button>
          </div>
          <div id="urlListContainer" class="url-list-container"></div>
          <div class="action-bar">
            <hyperlane-button id="addUrlBtn" variant="primary" size="medium">
              <span class="btn-text">Add New</span>
            </hyperlane-button>
            <hyperlane-button id="saveFileBtn" variant="success" size="medium">
              <span class="btn-text">Download</span>
            </hyperlane-button>
          </div>
        </div>
        <hyperlane-loading
          id="loadingContainer"
          text="Loading..."
        ></hyperlane-loading>
      </main>
    </div>
    <hyperlane-confirm id="confirmDialog"></hyperlane-confirm>
    <div id="toastContainer" class="toast-container"></div>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hyperlane - Diff</title>
    <link href="../common/css/common.css" rel="stylesheet" />
    <link href="../common/css/header.css" rel="stylesheet" />
    <link href="./index.css" rel="stylesheet" />
    <script src="../common/js/tailwindcss.js"></script>
    <script src="../common/js/common.js"></script>
    <script src="./index.js"></script>
  </head>
  <body>
    <div class="container">
      <header class="app-header shimmer-header">
        <div class="header-content">
          <h1 class="app-title">
            <a
              href="https://github.com/hyperlane-dev/hyperlane"
              target="_blank"
            >
              <img
                src="https://docs.ltpp.vip/img/hyperlane.png"
                alt=""
                class="nav-logo"
                onerror="this.style.display = 'none'"
              />
              <span class="text shimmer">Smart Text Diff Tool</span>
            </a>
          </h1>
        </div>
      </header>

      <main class="main-content">
        <div class="input-section">
          <div class="text-inputs">
            <div class="input-group">
              <div class="input-header">
                <label>Original Text</label>
                <button
                  class="btn btn-outline btn-sm"
                  onclick="copyText('text1')"
                >
                  <span class="icon">📋</span>
                  Copy
                </button>
              </div>
              <div class="textarea-container">
                <div
                  id="text1"
                  class="textarea-editable"
                  contenteditable="true"
                ></div>
              </div>
            </div>

            <div class="input-group">
              <div class="input-header">
                <label>Comparison Text</label>
                <button
                  class="btn btn-outline btn-sm"
                  onclick="copyText('text2')"
                >
                  <span class="icon">📋</span>
                  Copy
                </button>
              </div>
              <div class="textarea-container">
                <div
                  id="text2"
                  class="textarea-editable"
                  contenteditable="true"
                ></div>
              </div>
            </div>
          </div>

          <div class="controls">
            <div class="stats">
              <span class="stat-badge"
                >Added: <span id="added-count">0</span></span
              >
              <span class="stat-badge"
                >Removed: <span id="removed-count">0</span></span
              >
              <span class="stat-badge"
                >Unchanged: <span id="unchanged-count">0</span></span
              >
            </div>
            <button class="btn btn-outline" onclick="clearAll()">
              <span class="icon">🔄</span>
              Clear
            </button>
          </div>
        </div>

        <div class="diff-section">
          <div id="diff-result" class="diff-result">Enter text to compare</div>
        </div>
      </main>
    </div>
  </body>
</html>

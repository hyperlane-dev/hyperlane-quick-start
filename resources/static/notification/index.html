<!doctype html>
<html lang="en">
  <head>
    <script src="../common/js/theme-init.js"></script>
    <script
      src="../common/components/hyperlane-theme-toggle.js"
      type="module"
    ></script>
    <meta charset="UTF-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Hyperlane - Notifications</title>
    <link
      rel="icon"
      href="https://ltpp.vip/github/pages/docs-pages/pages/img/hyperlane.png"
    />
    <link href="../common/css/common.css" rel="stylesheet" />
    <link href="../common/css/header.css" rel="stylesheet" />
    <link href="../common/css/toast.css" rel="stylesheet" />
    <link href="./css/style.css" rel="stylesheet" />
    <script src="../common/js/common.js"></script>
    <script src="../common/js/toast.js"></script>
    <script src="../common/js/error-handler.js"></script>
    <script src="../common/components/hyperlane-confirm.js"></script>
    <script
      src="../common/components/hyperlane-select.js"
      type="module"
    ></script>
    <script src="./js/app.js" defer></script>
  </head>
  <body>
    <hyperlane-theme-toggle
      style="position: fixed; top: 16px; right: 16px; z-index: 10002"
    ></hyperlane-theme-toggle>
    <div class="container">
      <header class="app-header shimmer-header">
        <div class="header-content">
          <h1 class="app-title">
            <a
              href="https://github.com/hyperlane-dev/hyperlane"
              target="_blank"
            >
              <img
                src="https://ltpp.vip/github/pages/docs-pages/pages/img/hyperlane.png"
                alt=""
                class="nav-logo"
                onerror="this.style.display = 'none'"
              />
              <span class="text shimmer">Hyperlane Notifications</span>
            </a>
          </h1>
          <p class="app-subtitle">Manage your notifications</p>
        </div>
      </header>

      <div class="stats-panel">
        <div class="stat-card">
          <div class="stat-label">Total Notifications</div>
          <div class="stat-value" id="totalNotifications">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Unread</div>
          <div class="stat-value" id="unreadCount">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Current Page</div>
          <div class="stat-value" id="currentPage">1</div>
        </div>
      </div>

      <div class="results-panel">
        <div class="results-header">
          <div class="results-title">Notifications</div>
          <div class="filter-group">
            <hyperlane-select
              id="filterType"
              placeholder="All Types"
              options='[{"value":"","label":"All Types"},{"value":"system","label":"System"},{"value":"message","label":"Message"},{"value":"alert","label":"Alert"}]'
              value=""
            ></hyperlane-select>
            <hyperlane-select
              id="filterRead"
              placeholder="All Status"
              options='[{"value":"","label":"All Status"},{"value":"false","label":"Unread"},{"value":"true","label":"Read"}]'
              value=""
            ></hyperlane-select>
          </div>
        </div>
        <div id="resultsContainer">
          <div class="no-data">Loading notifications...</div>
        </div>
      </div>

      <div class="action-panel">
        <div class="button-group">
          <button class="btn btn-primary" onclick="app.openCreateModal()">
            + New Notification
          </button>
          <button class="btn btn-primary" onclick="app.markAllAsRead()">
            Mark All as Read
          </button>
          <button class="btn btn-secondary" onclick="app.refresh()">
            Refresh
          </button>
        </div>
      </div>
    </div>

    <div class="modal" id="detailModal">
      <div class="modal-content">
        <button
          class="modal-close"
          onclick="app.closeModal()"
          aria-label="Close"
        >
          <span>&times;</span>
        </button>
        <div class="modal-title" id="modalTitle">Notification Detail</div>
        <div id="modalContent"></div>
      </div>
    </div>

    <div class="modal" id="createModal">
      <div class="modal-content">
        <button
          class="modal-close"
          onclick="app.closeCreateModal()"
          aria-label="Close"
        >
          <span>&times;</span>
        </button>
        <div class="modal-title">Create Notification</div>
        <div class="form-group">
          <label class="form-label">Title</label>
          <input
            type="text"
            class="form-input"
            id="createTitle"
            placeholder="Enter notification title"
          />
        </div>
        <div class="form-group">
          <label class="form-label">Content</label>
          <textarea
            class="form-textarea"
            id="createContent"
            rows="4"
            placeholder="Enter notification content"
          ></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Type</label>
          <hyperlane-select
            id="createType"
            options='[{"value":"system","label":"System"},{"value":"message","label":"Message"},{"value":"alert","label":"Alert"}]'
            value="system"
          ></hyperlane-select>
        </div>
        <div class="form-actions">
          <button class="btn btn-secondary" onclick="app.closeCreateModal()">
            Cancel
          </button>
          <button class="btn btn-primary" onclick="app.submitCreate()">
            Create
          </button>
        </div>
      </div>
    </div>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hyperlane - RSS</title>
    <link rel="icon" href="https://docs.ltpp.vip/img/hyperlane.png" />
    <link href="../common/css/common.css" rel="stylesheet" />
    <link href="../common/css/header.css" rel="stylesheet" />
    <link href="index.css" rel="stylesheet" />
    <script src="../common/js/common.js"></script>
  </head>

  <body>
    <div class="container">
      <header class="app-header shimmer-header">
        <div class="header-content">
          <h1 class="app-title">
            <a
              href="https://github.com/hyperlane-dev/hyperlane"
              target="_blank"
            >
              <img
                src="https://docs.ltpp.vip/img/hyperlane.png"
                alt=""
                class="nav-logo"
                onerror="this.style.display = 'none'"
              />
              <span class="text shimmer"
                ><span class="title-full">Hyperlane RSS Feed Reader</span
                ><span class="title-short">RSS Reader</span></span
              >
            </a>
          </h1>
          <p class="app-subtitle">
            <a href="/upload" target="_blank" class="subscribe-link"
              >Subscribe to the latest uploaded resources</a
            >
          </p>
        </div>
      </header>

      <div id="loading" class="loading">
        <div class="spinner"></div>
        <p>Loading feed...</p>
      </div>

      <div id="error" style="display: none"></div>
      <div id="emptyState" style="display: none"></div>
      <div id="feedItems" class="feed-items"></div>

      <div class="controls-row" id="controlsRow" style="display: none">
        <div class="page-size-selector">
          <label>Items per page:</label>
          <select id="pageSize" onchange="changePageSize()">
            <option value="10">10</option>
            <option value="20" selected>20</option>
            <option value="50">50</option>
            <option value="100">100</option>
          </select>
        </div>
      </div>

      <div class="pagination" id="pagination" style="display: none">
        <button class="pagination-btn" id="prevBtn" onclick="previousPage()">
          Previous
        </button>
        <span class="pagination-info" id="pageInfo">Page 1</span>
        <button class="pagination-btn" id="nextBtn" onclick="nextPage()">
          Next
        </button>
      </div>
    </div>

    <script src="index.js"></script>
  </body>
</html>

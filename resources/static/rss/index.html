<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hyperlane - RSS</title>
    <link rel="icon" href="https://docs.ltpp.vip/img/hyperlane.png" />
    <link href="../common/css/common.css" rel="stylesheet" />
    <link href="../common/css/header.css" rel="stylesheet" />
    <link href="index.css" rel="stylesheet" />
    <script src="../common/js/common.js"></script>
    <script
      src="../common/components/hyperlane-loading.js"
      type="module"
    ></script>
    <script
      src="../common/components/hyperlane-pagination.js"
      type="module"
    ></script>
    <script
      src="../common/components/hyperlane-select.js"
      type="module"
    ></script>
    <script
      src="../common/components/hyperlane-header.js"
      type="module"
    ></script>
    <script src="./components/hyperlane-feed-item.js" type="module"></script>
  </head>

  <body>
    <div class="container">
      <hyperlane-header title="Hyperlane RSS Feed Reader" shimmer>
        <p class="app-subtitle">
          <a href="/upload" target="_blank" class="subscribe-link"
            >Subscribe to the latest uploaded resources</a
          >
        </p>
      </hyperlane-header>

      <hyperlane-loading
        id="loading"
        visible
        text="Loading feed..."
      ></hyperlane-loading>

      <div id="error" style="display: none"></div>
      <div id="emptyState" style="display: none"></div>
      <div id="feedItems" class="feed-items"></div>

      <div class="controls-row" id="controlsRow" style="display: none">
        <div class="page-size-selector">
          <label>Items per page:</label>
          <hyperlane-select
            id="pageSize"
            value="20"
            options='[{"value":"10","label":"10"},{"value":"20","label":"20"},{"value":"50","label":"50"},{"value":"100","label":"100"}]'
          ></hyperlane-select>
        </div>
      </div>

      <hyperlane-pagination
        id="pagination"
        current="1"
        total="1"
      ></hyperlane-pagination>
    </div>

    <script src="index.js"></script>
  </body>
</html>

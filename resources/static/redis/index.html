<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Hyperlane - Redis</title>
    <link rel="icon" href="https://docs.ltpp.vip/img/hyperlane.png" />
    <link href="../common/css/common.css" rel="stylesheet" />
    <link href="../common/css/header.css" rel="stylesheet" />
    <link href="index.css" rel="stylesheet" />
    <script src="../common/js/common.js"></script>
  </head>

  <body>
    <div class="container">
      <header class="app-header shimmer-header">
        <div class="header-content">
          <h1 class="app-title">
            <a
              href="https://github.com/hyperlane-dev/hyperlane"
              target="_blank"
            >
              <img
                src="https://docs.ltpp.vip/img/hyperlane.png"
                alt=""
                class="nav-logo"
                onerror="this.style.display = 'none'"
              />
              <span class="text shimmer"
                ><span class="title-full">Hyperlane Redis Management</span
                ><span class="title-short">Redis Manager</span></span
              >
            </a>
          </h1>
          <p class="app-subtitle">Manage your Redis cache records</p>
        </div>
      </header>

      <div class="card">
        <h2>Add New Record</h2>
        <div class="form-row">
          <div class="form-group">
            <input id="create-key" placeholder="Key" type="text" />
          </div>
          <div class="form-group">
            <input id="create-value" placeholder="Value" type="text" />
          </div>
          <button class="btn btn-primary" id="create-btn">Add Record</button>
        </div>
      </div>

      <div class="card" id="records">
        <h2>Records</h2>
        <div id="records-list"></div>
      </div>
    </div>

    <div class="modal" id="edit-modal">
      <div class="modal-content">
        <h3>Edit Record</h3>
        <input id="edit-key" type="hidden" />
        <div class="form-group">
          <input id="edit-value" placeholder="Value" type="text" />
        </div>
        <div class="modal-actions">
          <button class="btn btn-secondary" onclick="toggleModal(false)">
            Cancel
          </button>
          <button class="btn btn-primary" id="edit-btn">Save</button>
        </div>
      </div>
    </div>

    <div class="toast-container" id="toast-container"></div>

    <script src="index.js"></script>
  </body>
</html>

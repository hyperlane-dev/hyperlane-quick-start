<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hyperlane - Upload</title>
    <link rel="icon" href="https://docs.ltpp.vip/img/hyperlane.png" />
    <link href="../common/css/common.css" rel="stylesheet" />
    <link href="../common/css/header.css" rel="stylesheet" />
    <link href="index.css" rel="stylesheet" />
    <script src="../common/js/common.js"></script>
  </head>

  <body>
    <div class="container">
      <header class="app-header shimmer-header">
        <div class="header-content">
          <h1 class="app-title">
            <a
              href="https://github.com/hyperlane-dev/hyperlane"
              target="_blank"
            >
              <img
                src="https://docs.ltpp.vip/img/hyperlane.png"
                alt=""
                class="nav-logo"
                onerror="this.style.display = 'none'"
              />
              <span class="text shimmer">Hyperlane File Upload</span>
            </a>
          </h1>
          <p class="app-subtitle">Upload and manage your files</p>
        </div>
      </header>

      <div class="upload-container">
        <div id="status" class="status" style="display: none"></div>
        <div class="history-container">
          <div id="history"></div>
        </div>

        <div class="action-group">
          <label for="file-input" class="btn">
            <svg
              width="20"
              height="20"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M12 4v16m8-8H4"
              />
            </svg>
            Select Files
          </label>
          <input type="file" id="file-input" class="file-input" multiple />

          <button class="btn" id="exportBtn">
            <svg
              width="20"
              height="20"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"
              />
            </svg>
            Export Data
          </button>

          <label for="importFile" class="btn">
            <svg
              width="20"
              height="20"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"
              />
            </svg>
            Import Data
          </label>
          <input
            type="file"
            id="importFile"
            class="file-input"
            accept=".json"
          />
        </div>
      </div>
    </div>

    <script src="index.js"></script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hyperlane - Upload</title>
    <link rel="icon" href="https://docs.ltpp.vip/img/hyperlane.png" />
    <link href="../common/css/common.css" rel="stylesheet" />
    <link href="../common/css/header.css" rel="stylesheet" />
    <link href="index.css" rel="stylesheet" />
    <script src="../common/js/common.js"></script>
    <script
      src="../common/components/hyperlane-button.js"
      type="module"
    ></script>
    <script
      src="../common/components/hyperlane-status.js"
      type="module"
    ></script>
    <script
      src="../common/components/hyperlane-progress.js"
      type="module"
    ></script>
    <script
      src="../common/components/hyperlane-header.js"
      type="module"
    ></script>
    <script
      src="../common/components/hyperlane-file-input.js"
      type="module"
    ></script>
    <script
      src="./components/hyperlane-upload-history.js"
      type="module"
    ></script>
  </head>

  <body>
    <div class="container">
      <hyperlane-header
        title="Hyperlane File Upload"
        subtitle="Upload and manage your files"
        shimmer
      ></hyperlane-header>

      <div class="upload-container">
        <hyperlane-status id="status-component"></hyperlane-status>
        <div class="history-container">
          <hyperlane-upload-history
            id="uploadHistory"
          ></hyperlane-upload-history>
        </div>

        <div class="action-group">
          <hyperlane-file-input id="file-input" multiple>
            <svg
              width="20"
              height="20"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M12 4v16m8-8H4"
              />
            </svg>
            Select Files
          </hyperlane-file-input>

          <hyperlane-button id="exportBtn" variant="success">
            <svg
              width="20"
              height="20"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"
              />
            </svg>
            Export Data
          </hyperlane-button>

          <hyperlane-file-input id="importFile" accept=".json">
            <svg
              width="20"
              height="20"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"
              />
            </svg>
            Import Data
          </hyperlane-file-input>
        </div>
      </div>
    </div>

    <script src="index.js"></script>
  </body>
</html>

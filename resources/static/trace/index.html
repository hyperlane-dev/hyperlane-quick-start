<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hyperlane - Trace Query</title>
    <link rel="icon" href="https://docs.ltpp.vip/img/hyperlane.png" />
    <link href="../common/css/common.css" rel="stylesheet" />
    <link href="../common/css/header.css" rel="stylesheet" />
    <script src="../common/js/common.js"></script>
    <style>
      body {
        background: #667eea;
        padding: 20px;
      }

      .container {
        max-width: 900px;
        margin: 0 auto;
        margin-bottom: 20px;
      }

      .app-header .header-content {
        max-width: 1200px;
        margin: 0 auto;
      }

      .search-card {
        background: white;
        border-radius: 12px;
        padding: 24px;
        margin-bottom: 20px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        animation: fadeInUp 0.6s ease;
      }

      .search-container {
        display: flex;
        gap: 12px;
        margin-bottom: 0;
      }

      #traceId {
        flex: 1;
        padding: 12px 16px;
        border: 2px solid #e9ecef;
        border-radius: 8px;
        font-size: 16px;
        transition: all 0.3s ease;
        font-family: 'Courier New', monospace;
      }

      #traceId:focus {
        outline: none;
        border-color: #667eea;
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
      }

      button {
        background: #667eea;
        color: white;
        border: none;
        padding: 12px 32px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 16px;
        font-weight: 600;
        transition: all 0.3s ease;
        box-shadow: 0 2px 8px rgba(102, 126, 234, 0.3);
      }

      button:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
      }

      button:active {
        transform: translateY(0);
      }

      .app-title,
      .app-title span,
      button {
        white-space: nowrap;
      }

      .result-card {
        background: white;
        border-radius: 12px;
        padding: 24px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        animation: fadeInUp 0.6s ease 0.1s both;
      }

      .request-url {
        margin-bottom: 16px;
        padding: 12px 16px;
        background: rgba(102, 126, 234, 0.1);
        border: 1px solid rgba(102, 126, 234, 0.2);
        border-radius: 8px;
        font-family: 'Courier New', monospace;
        font-size: 13px;
        word-break: break-all;
        cursor: pointer;
        transition: all 0.3s ease;
        color: #667eea;
        font-weight: 500;
      }

      .request-url:hover {
        background: rgba(102, 126, 234, 0.15);
        border-color: rgba(102, 126, 234, 0.4);
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2);
      }

      .status-message {
        padding: 12px 16px;
        border-radius: 8px;
        margin-bottom: 16px;
        font-weight: 600;
        animation: fadeIn 0.3s ease;
      }

      .status-message.success {
        background: #d4edda;
        color: #155724;
        border-left: 4px solid #28a745;
      }

      .status-message.error {
        background: #f8d7da;
        color: #721c24;
        border-left: 4px solid #dc3545;
      }

      #result {
        background: #f8f9fa;
        border: 1px solid #e9ecef;
        border-radius: 8px;
        padding: 16px;
        white-space: pre-wrap;
        word-wrap: break-word;
        overflow-wrap: break-word;
        font-family: 'Courier New', monospace;
        font-size: 14px;
        line-height: 1.6;
        min-height: 100px;
        max-height: 600px;
        overflow-y: auto;
        color: #2c3e50;
      }

      #result::-webkit-scrollbar {
        width: 6px;
      }

      #result::-webkit-scrollbar-track {
        background: rgba(0, 0, 0, 0.05);
      }

      #result::-webkit-scrollbar-thumb {
        background: rgba(102, 126, 234, 0.3);
        border-radius: 3px;
      }

      .empty-result {
        color: #6c757d;
        font-style: italic;
        text-align: center;
        padding: 40px 20px;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
        }

        to {
          opacity: 1;
        }
      }

      @keyframes fadeInDown {
        from {
          opacity: 0;
          transform: translateY(-20px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (max-width: 768px) {
        body {
          padding: 15px;
        }

        .app-title {
          font-size: 1.75rem;
        }

        .app-subtitle {
          font-size: 1rem;
        }

        .search-card,
        .result-card {
          padding: 16px;
        }

        .search-container {
          flex-direction: column;
        }

        #traceId {
          font-size: 14px;
        }

        button {
          width: 100%;
          padding: 10px 24px;
        }

        #result {
          font-size: 13px;
          max-height: 400px;
        }
      }

      @media (max-width: 480px) {
        .app-title {
          font-size: 1.5rem;
        }
      }
    </style>
    <script>
      async function searchTrace() {
        const traceId = document.getElementById('traceId').value.trim();
        const result = document.getElementById('result');
        const resultCard = result.parentElement;

        const existingMessages = resultCard.querySelectorAll(
          '.status-message, .request-url',
        );
        existingMessages.forEach((msg) => msg.remove());

        result.className = '';

        if (!traceId) {
          result.textContent = 'Please enter a valid Trace ID';
          result.className = 'empty-result';
          return;
        }

        const baseUrl = window.location.origin;
        const requestUrl = `${baseUrl}/api/trace/${encodeURIComponent(
          traceId,
        )}`;
        const urlElement = document.createElement('div');
        urlElement.className = 'request-url';
        urlElement.textContent = requestUrl;
        urlElement.title = 'Click to open request URL in new window';
        urlElement.onclick = function () {
          window.open(requestUrl, '_blank');
        };
        resultCard.insertBefore(urlElement, result);

        try {
          const response = await fetch(requestUrl);

          if (response.ok) {
            const data = await response.text();
            result.textContent = data;
            const successMsg = document.createElement('div');
            successMsg.className = 'status-message success';
            successMsg.textContent = '✓ Search completed successfully';
            resultCard.insertBefore(successMsg, result);
          } else if (response.status === 404) {
            result.textContent = 'Trace record not found';
            result.className = 'empty-result';
            const errorMsg = document.createElement('div');
            errorMsg.className = 'status-message error';
            errorMsg.textContent = '✗ Search failed: Trace record not found';
            resultCard.insertBefore(errorMsg, result);
          } else {
            result.textContent = `Request failed: ${response.status} ${response.statusText}`;
            result.className = 'empty-result';
            const errorMsg = document.createElement('div');
            errorMsg.className = 'status-message error';
            errorMsg.textContent = `✗ Search failed: ${response.status} ${response.statusText}`;
            resultCard.insertBefore(errorMsg, result);
          }
        } catch (error) {
          result.textContent = `Network request error: ${error.message}`;
          result.className = 'empty-result';
          const errorMsg = document.createElement('div');
          errorMsg.className = 'status-message error';
          errorMsg.textContent = `✗ Search failed: Network request error - ${error.message}`;
          resultCard.insertBefore(errorMsg, result);
        }
      }

      document.addEventListener('DOMContentLoaded', function () {
        const traceIdInput = document.getElementById('traceId');
        if (traceIdInput) {
          traceIdInput.addEventListener('keydown', function (e) {
            if (e.key === 'Enter') {
              e.preventDefault();
              searchTrace();
            }
          });
        }
      });
    </script>
  </head>

  <body>
    <div class="container">
      <header class="app-header shimmer-header">
        <div class="header-content">
          <h1 class="app-title">
            <a
              href="https://github.com/hyperlane-dev/hyperlane"
              target="_blank"
            >
              <img
                src="https://docs.ltpp.vip/img/hyperlane.png"
                alt=""
                class="nav-logo"
                onerror="this.style.display = 'none'"
              />
              <span class="text shimmer">Hyperlane Trace Query</span>
            </a>
          </h1>
          <p class="app-subtitle">Search and analyze trace records</p>
        </div>
      </header>

      <div class="search-card">
        <div class="search-container">
          <input type="text" id="traceId" placeholder="Enter Trace ID" />
          <button onclick="searchTrace()">Search</button>
        </div>
      </div>

      <div class="result-card">
        <pre id="result" class="empty-result">
Please enter a Trace ID and click the search button</pre
        >
      </div>
    </div>
  </body>
</html>

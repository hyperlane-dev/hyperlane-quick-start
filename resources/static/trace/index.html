<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hyperlane - Trace Query</title>
    <link rel="icon" href="https://docs.ltpp.vip/img/hyperlane.png" />
    <link href="../common/css/common.css" rel="stylesheet" />
    <link href="../common/css/header.css" rel="stylesheet" />
    <link href="index.css" rel="stylesheet" />
    <script src="../common/js/common.js"></script>
    <script
      src="../common/components/hyperlane-button.js"
      type="module"
    ></script>
    <script
      src="../common/components/hyperlane-input.js"
      type="module"
    ></script>
    <script src="../common/components/hyperlane-card.js" type="module"></script>
    <script
      src="../common/components/hyperlane-header.js"
      type="module"
    ></script>
    <script src="./components/hyperlane-trace-search.js" type="module"></script>
    <script src="./components/hyperlane-trace-result.js" type="module"></script>
  </head>

  <body>
    <div class="container">
      <hyperlane-header
        title="Hyperlane Trace Query"
        subtitle="Search and analyze trace records"
        shimmer
      ></hyperlane-header>

      <hyperlane-card class="search-card" padding="24px">
        <hyperlane-trace-search id="traceSearch"></hyperlane-trace-search>
      </hyperlane-card>

      <hyperlane-card class="result-card" padding="24px">
        <hyperlane-trace-result
          id="traceResult"
          status="empty"
        ></hyperlane-trace-result>
      </hyperlane-card>
    </div>

    <script src="index.js"></script>
  </body>
</html>

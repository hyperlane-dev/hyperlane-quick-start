<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="IE=edge" http-equiv="X-UA-Compatible" />
    <meta
      content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"
      name="viewport"
    />
    <title>Hyperlane - Gomoku</title>
    <link rel="icon" href="https://docs.ltpp.vip/img/hyperlane.png" />
    <link href="../common/css/common.css" rel="stylesheet" />
    <link href="../common/css/header.css" rel="stylesheet" />
    <link href="./index.css" rel="stylesheet" />
    <script src="../common/js/common.js"></script>
  </head>
  <body>
    <div class="toast-container" id="toastContainer"></div>

    <div class="app">
      <header
        class="app-header shimmer-header light-bg"
        style="padding: 12px 20px; text-align: left"
      >
        <div
          class="header-content"
          style="
            display: flex;
            align-items: center;
            justify-content: space-between;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
          "
        >
          <h1 class="app-title" style="margin: 0; font-size: 1.25rem">
            <a
              href="https://github.com/hyperlane-dev/hyperlane"
              target="_blank"
              style="display: flex; align-items: center; gap: 10px"
            >
              <img
                src="https://docs.ltpp.vip/img/hyperlane.png"
                alt=""
                class="nav-logo"
                style="width: 32px; height: 32px; border-radius: 6px"
                onerror="this.style.display = 'none'"
              />
              <span class="text shimmer">Gomoku</span>
            </a>
          </h1>
          <div class="status" id="connectionStatus">
            <div class="status-dot"></div>
            <span id="statusText">Disconnected</span>
          </div>
        </div>
      </header>

      <div class="main">
        <div class="panel">
          <h2>Room</h2>
          <div class="field">
            <label>User ID</label>
            <input type="text" id="userIdInput" readonly />
          </div>
          <div class="field">
            <label>Room ID</label>
            <input type="text" id="roomIdInput" placeholder="Enter room ID" />
          </div>
          <div class="actions">
            <button id="createBtn">Create</button>
            <button id="joinBtn" class="secondary">Join</button>
            <button id="spectateBtn" class="secondary">Watch</button>
            <button id="leaveBtn" class="secondary">Leave</button>
          </div>
          <div class="room-info">
            <div>Room: <span id="currentRoom">-</span></div>
            <div>Role: <span id="myRole">-</span></div>
            <div>Turn: <span id="turnInfo">-</span></div>
            <div>Status: <span id="gameStatus">-</span></div>
          </div>
        </div>

        <div class="board-wrapper">
          <div class="board" id="gomokuBoard"></div>
        </div>

        <div class="panel panel-scroll">
          <h2>Players</h2>
          <div class="sidebar-list" id="playersList"><span>-</span></div>
          <h2 style="margin-top: 12px">Spectators</h2>
          <div class="sidebar-list" id="spectatorsList"><span>-</span></div>
          <h2 style="margin-top: 12px">Moves</h2>
          <div class="move-log" id="moveLog"><span>-</span></div>
        </div>
      </div>

      <footer class="footer">
        <div>
          © 2025 <a href="https://docs.ltpp.vip/hyperlane/">Hyperlane</a>. All
          rights reserved.
        </div>
      </footer>
    </div>

    <script src="./index.js"></script>
  </body>
</html>
